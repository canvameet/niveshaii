<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NiveshAI - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated grid background */
        .grid-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 400px;
            padding: 40px;
            border: 2px solid #fff;
            background: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .logo p {
            font-size: 12px;
            letter-spacing: 4px;
            opacity: 0.7;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #fff;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            border-color: #fff;
        }

        .form-group input::placeholder {
            color: #666;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: #fff;
            color: #000;
            border: 2px solid #fff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #000;
            color: #fff;
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #fff;
            background: rgba(255, 255, 255, 0.1);
            font-size: 12px;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            letter-spacing: 2px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            letter-spacing: 2px;
            opacity: 0.5;
        }

        /* Blinking cursor effect */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #fff;
            animation: blink 1s infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="grid-background"></div>

    <div class="login-container">
        <div class="logo">
            <h1>NIVESHAI</h1>
            <p>AI TRADING SYSTEM</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">EMAIL</label>
                <input type="email" id="email" placeholder="user@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                LOGIN<span class="cursor"></span>
            </button>

            <div class="loading" id="loading">AUTHENTICATING...</div>
            <div class="error-message" id="errorMessage"></div>
        </form>
    </div>

    <div class="footer">
        AIMERS AI SOLUTIONS © 2026
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        // Fetch Firebase configuration from backend
        let auth;
        
        async function initializeFirebase() {
            try {
                const response = await fetch('/api/firebase-config');
                const firebaseConfig = await response.json();
                
                // Initialize Firebase
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                
                // Check if user is already logged in
                auth.onAuthStateChanged((user) => {
                    if (user) {
                        // User is signed in, redirect to main page
                        window.location.href = '/';
                    }
                });
                
                // Setup form handler
                setupLoginForm();
                
            } catch (error) {
                console.error('Firebase initialization error:', error);
                showError('Failed to initialize authentication system');
            }
        }

        // Initialize Firebase on page load
        initializeFirebase();

        // Form elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');

        function setupLoginForm() {
            // Handle form submission
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                // Validate inputs
                if (!email || !password) {
                    showError('Please enter both email and password');
                    return;
                }

                // Show loading state
                loginBtn.disabled = true;
                loading.classList.add('show');
                errorMessage.classList.remove('show');

                try {
                    // Sign in with Firebase
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    
                    // Create session on backend
                    const response = await fetch('/api/verify-token', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            uid: userCredential.user.uid,
                            email: userCredential.user.email
                        })
                    });

                    if (response.ok) {
                        // Success - redirect to main page
                        console.log('Login successful:', userCredential.user);
                        window.location.href = '/';
                    } else {
                        throw new Error('Session creation failed');
                    }
                    
                } catch (error) {
                    // Handle errors
                    console.error('Login error:', error);
                    
                    let errorMsg = 'Login failed. Please try again.';
                    
                    switch (error.code) {
                        case 'auth/invalid-email':
                            errorMsg = 'Invalid email address';
                            break;
                        case 'auth/user-disabled':
                            errorMsg = 'This account has been disabled';
                            break;
                        case 'auth/user-not-found':
                            errorMsg = 'No account found with this email';
                            break;
                        case 'auth/wrong-password':
                            errorMsg = 'Incorrect password';
                            break;
                        case 'auth/invalid-credential':
                            errorMsg = 'Invalid credentials';
                            break;
                        case 'auth/too-many-requests':
                            errorMsg = 'Too many attempts. Please try again later';
                            break;
                    }
                    
                    showError(errorMsg);
                    
                } finally {
                    // Hide loading state
                    loginBtn.disabled = false;
                    loading.classList.remove('show');
                }
            });
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }
    </script>
</body>
</html>
